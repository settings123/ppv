<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamTV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #07090F;
  --bg2:     #0D1018;
  --bg3:     #131720;
  --bg4:     #1A2030;
  --accent:  #E8F400;
  --accent2: #FF3D5A;
  --text:    #E8EAF2;
  --muted:   #505570;
  --border:  #1C2135;
  --live:    #FF3D5A;
  --head:    'Barlow Condensed', sans-serif;
  --body:    'Barlow', sans-serif;
  --r:       10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  display: flex;
  flex-direction: column;
}

/* ── Header ───────────────────────────────────────────── */
#header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 18px 40px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

#logo {
  font-family: var(--head);
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
  line-height: 1;
}

#logo span { color: var(--muted); font-weight: 300; }

#crawlBtn {
  background: var(--accent);
  border: none;
  border-radius: 6px;
  color: #000;
  cursor: pointer;
  font-family: var(--head);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 10px 28px;
  text-transform: uppercase;
  transition: opacity 0.15s, transform 0.1s;
}
#crawlBtn:hover { opacity: 0.85; transform: scale(1.02); }
#crawlBtn:disabled { opacity: 0.35; cursor: default; transform: none; }

#statusBar {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 14px;
}

#statusText {
  font-family: var(--head);
  font-size: 0.9rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-transform: uppercase;
}

#streamCounter {
  background: var(--bg4);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--accent);
  font-family: var(--head);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 4px 14px;
}

#progressBar {
  height: 2px;
  background: var(--border);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
#progressFill {
  position: absolute;
  left: -100%;
  top: 0;
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: none;
}
#progressFill.running {
  animation: scan 1.4s linear infinite;
}
@keyframes scan { to { left: 100%; } }

/* ── Grid ─────────────────────────────────────────────── */
#gridWrap {
  flex: 1;
  overflow-y: auto;
  padding: 28px 40px 40px;
  scrollbar-width: thin;
  scrollbar-color: var(--bg4) transparent;
}
#gridWrap::-webkit-scrollbar { width: 6px; }
#gridWrap::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

#emptyState {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
  color: var(--muted);
  text-align: center;
}
#emptyState .big {
  font-family: var(--head);
  font-size: 3rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--bg4);
}
#emptyState p {
  font-size: 0.95rem;
  line-height: 1.6;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* ── Card ─────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 18px 20px;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
  outline: none;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.2s;
}
.card:hover, .card:focus {
  background: var(--bg3);
  border-color: var(--accent);
  transform: translateY(-2px);
}
.card:hover::before, .card:focus::before { transform: scaleX(1); }

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.badge {
  background: var(--bg4);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--accent);
  font-family: var(--head);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
  text-transform: uppercase;
}
.badge.hls { border-color: rgba(232,244,0,0.3); }
.badge.live { background: var(--live); border-color: var(--live); color: #fff; }

.card-title {
  font-family: var(--head);
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  line-height: 1.25;
  color: var(--text);
  flex: 1;
}

.card-url {
  color: var(--muted);
  font-size: 0.72rem;
  font-family: monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.play-hint {
  position: absolute;
  bottom: 14px;
  right: 16px;
  opacity: 0;
  transition: opacity 0.15s;
  color: var(--accent);
  font-family: var(--head);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.card:hover .play-hint, .card:focus .play-hint { opacity: 1; }

/* ── Player overlay ───────────────────────────────────── */
#playerOverlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: #000;
  flex-direction: column;
}
#playerOverlay.active { display: flex; }

#videoEl {
  flex: 1;
  width: 100%;
  background: #000;
  outline: none;
}

/* Player controls bar */
#playerBar {
  flex-shrink: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.95));
  padding: 14px 28px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: absolute;
  bottom: 0; left: 0; right: 0;
  transform: translateY(0);
  transition: transform 0.3s, opacity 0.3s;
}
#playerBar.hidden { transform: translateY(100%); opacity: 0; }

#playerTitle {
  flex: 1;
  font-family: var(--head);
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#playerInfo {
  font-family: var(--head);
  font-size: 0.85rem;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-transform: uppercase;
}

/* Quality picker */
#qualityWrap {
  position: relative;
}

#qualityBtn {
  background: var(--bg4);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  cursor: pointer;
  font-family: var(--head);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 8px 16px;
  text-transform: uppercase;
  transition: border-color 0.15s;
}
#qualityBtn:hover { border-color: var(--accent); color: var(--accent); }

#qualityMenu {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  right: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  min-width: 140px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#qualityMenu.open { display: block; }

.quality-opt {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  font-family: var(--head);
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  transition: background 0.1s;
  text-transform: uppercase;
}
.quality-opt:hover { background: var(--bg4); }
.quality-opt.active { color: var(--accent); }
.quality-opt .check { color: var(--accent); font-size: 0.8rem; }

#closeBtn {
  background: rgba(255,61,90,0.15);
  border: 1px solid rgba(255,61,90,0.4);
  border-radius: 6px;
  color: var(--accent2);
  cursor: pointer;
  font-family: var(--head);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 8px 18px;
  text-transform: uppercase;
  transition: background 0.15s;
}
#closeBtn:hover { background: rgba(255,61,90,0.3); }

#playerError {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,61,90,0.12);
  border: 1px solid var(--accent2);
  border-radius: 8px;
  color: var(--accent2);
  font-family: var(--head);
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 18px 28px;
  text-align: center;
  text-transform: uppercase;
}

/* ── Loading spinner ──────────────────────────────────── */
.spinner-wrap {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  background: rgba(7,9,15,0.7);
  z-index: 10;
}
.spinner-wrap.active { display: flex; }
.spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ───────────────────────────────────────── */
@media (max-width: 600px) {
  #header { padding: 14px 20px; }
  #gridWrap { padding: 20px; }
  #grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  #logo { font-size: 1.4rem; }
}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="logo">Stream<span>TV</span></div>
  <div id="statusBar">
    <span id="statusText">Ready</span>
    <span id="streamCounter">0 streams</span>
  </div>
  <button id="crawlBtn">⬡ Scan NBA Games</button>
</div>

<div id="progressBar"><div id="progressFill"></div></div>

<!-- Grid -->
<div id="gridWrap">
  <div id="emptyState">
    <div class="big">No Streams</div>
    <p>Press <strong>Scan NBA Games</strong> to find today's streams.</p>
  </div>
  <div id="grid" style="display:none"></div>
</div>

<!-- Player -->
<div id="playerOverlay">
  <video id="videoEl" controls autoplay playsinline></video>
  <div class="spinner-wrap" id="playerSpinner"><div class="spinner"></div></div>
  <div id="playerError"></div>
  <div id="playerBar">
    <span id="playerTitle"></span>
    <span id="playerInfo"></span>
    <div id="qualityWrap">
      <button id="qualityBtn">Quality</button>
      <div id="qualityMenu"></div>
    </div>
    <button id="closeBtn">✕ Close</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const streams = [];
let hlsInstance = null;
let currentStream = null;
let barTimeout = null;
let barVisible = true;

// ── DOM refs ───────────────────────────────────────────────────────────────────
const crawlBtn      = document.getElementById('crawlBtn');
const statusText    = document.getElementById('statusText');
const streamCounter = document.getElementById('streamCounter');
const progressFill  = document.getElementById('progressFill');
const emptyState    = document.getElementById('emptyState');
const grid          = document.getElementById('grid');

const playerOverlay = document.getElementById('playerOverlay');
const videoEl       = document.getElementById('videoEl');
const playerSpinner = document.getElementById('playerSpinner');
const playerTitle   = document.getElementById('playerTitle');
const playerInfo    = document.getElementById('playerInfo');
const playerError   = document.getElementById('playerError');
const playerBar     = document.getElementById('playerBar');
const qualityBtn    = document.getElementById('qualityBtn');
const qualityMenu   = document.getElementById('qualityMenu');
const closeBtn      = document.getElementById('closeBtn');

// ── Crawl ──────────────────────────────────────────────────────────────────────
crawlBtn.addEventListener('click', startCrawl);
window.addEventListener('load', startCrawl);

async function startCrawl() {
  crawlBtn.disabled = true;
  progressFill.classList.add('running');
  streams.length = 0;
  grid.innerHTML = '';
  grid.style.display = 'none';
  emptyState.style.display = 'flex';
  statusText.textContent = 'Connecting…';
  streamCounter.textContent = '0 streams';

  // Open SSE before triggering crawl
  const es = new EventSource('/api/crawl-progress');

  es.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'start') {
      statusText.textContent = 'Starting…';

    } else if (msg.type === 'status') {
      statusText.textContent = msg.msg;

    } else if (msg.type === 'visiting') {
      const short = msg.url.replace('https://ppv.to/live/nba/', '');
      statusText.textContent = `Checking: ${short}`;

    } else if (msg.type === 'stream') {
      addStream(msg.stream);

    } else if (msg.type === 'no_stream') {
      // game found but no stream yet — could show grayed card in future

    } else if (msg.type === 'done') {
      statusText.textContent = `Done — ${msg.total} stream${msg.total !== 1 ? 's' : ''} found`;
      streamCounter.textContent = `${msg.total} stream${msg.total !== 1 ? 's' : ''}`;
      progressFill.classList.remove('running');
      crawlBtn.disabled = false;
      crawlBtn.textContent = '↺ Refresh';
      es.close();

    } else if (msg.type === 'error') {
      // silently skip
    }
  };

  es.onerror = () => {
    es.close();
    progressFill.classList.remove('running');
    crawlBtn.disabled = false;
  };

  // Trigger crawl
  await fetch('/api/crawl', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  }).catch(() => {});
}

// ── Add stream card ────────────────────────────────────────────────────────────
function addStream(s) {
  if (streams.find(x => x.slug === s.slug)) return;
  streams.push(s);

  emptyState.style.display = 'none';
  grid.style.display = 'grid';
  streamCounter.textContent = `${streams.length} stream${streams.length !== 1 ? 's' : ''}`;

  const idx = streams.length - 1;
  const card = document.createElement('div');
  card.className = 'card';
  card.tabIndex = 0;
  card.dataset.index = idx;
  card.innerHTML = `
    <div class="card-top">
      <span class="badge hls live">● LIVE</span>
      <span class="card-title">${esc(s.label)}</span>
    </div>
    <div class="card-url">${esc(s.slug)}</div>
    <span class="play-hint">▶ Play</span>
  `;

  card.addEventListener('click', () => openAndPlay(idx));
  card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openAndPlay(idx); }
  });

  grid.appendChild(card);
}

// ── Player ─────────────────────────────────────────────────────────────────────
async function openAndPlay(idx) {
  const s = streams[idx];
  if (!s) return;
  currentStream = s;

  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  videoEl.pause();
  videoEl.removeAttribute('src');
  playerError.style.display = 'none';
  qualityMenu.innerHTML = '';
  qualityMenu.classList.remove('open');
  qualityBtn.textContent = 'Quality';

  playerTitle.textContent = s.label;
  playerInfo.textContent = 'Opening stream…';
  playerSpinner.classList.add('active');
  playerOverlay.classList.add('active');
  showBar();

  try {
    const resp = await fetch('/api/play', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: s.slug })
    });
    const data = await resp.json();
    if (!resp.ok || !data.proxyUrl) {
      playerSpinner.classList.remove('active');
      playerError.textContent = data.error || 'Could not open stream';
      playerError.style.display = 'block';
      return;
    }

    // Use relay URL — served from our server so no IP lock, works in any player
    const relayUrl = window.location.origin + data.proxyUrl;
    showVlcButton(relayUrl, s.label);
    playHLS(data.proxyUrl, s);
  } catch (err) {
    playerSpinner.classList.remove('active');
    playerError.textContent = 'Error: ' + err.message;
    playerError.style.display = 'block';
  }
}

function showVlcButton(url, label) {
  document.getElementById('vlcBtn')?.remove();
  document.getElementById('vlcUrlBar')?.remove();

  // VLC button — navigates to /open-vlc which serves m3u8 MIME type
  // triggering Google TV's "Open with" dialog
  const openUrl = '/open-vlc?url=' + encodeURIComponent(url) + '&title=' + encodeURIComponent(label);
  const btn = document.createElement('button');
  btn.id = 'vlcBtn';
  btn.className = 'btn secondary';
  btn.style.cssText = 'background:#e8a000;color:#000;font-weight:700;letter-spacing:0.05em;';
  btn.textContent = '📺 Open in Player';
  btn.onclick = () => { window.location.href = openUrl; };
  playerBar.insertBefore(btn, closeBtn);

  // Show relay URL — paste this into VLC > Network Stream
  // This URL is served from YOUR server so it works from any device/IP
  const bar = document.createElement('div');
  bar.id = 'vlcUrlBar';
  bar.style.cssText = `
    position:absolute; bottom:100%; left:0; right:0;
    background:var(--bg3); border-top:1px solid var(--border);
    padding:10px 16px; display:flex; align-items:center; gap:10px;
  `;
  bar.innerHTML = `
    <span style="font-family:var(--head);font-size:0.75rem;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:0.08em;">VLC Network URL:</span>
    <span id="vlcUrlText" style="font-family:monospace;font-size:0.72rem;color:var(--accent);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${url}</span>
    <button onclick="navigator.clipboard?.writeText('${url.replace(/'/g,"\'")}').then(()=>{this.textContent='✓ Copied';setTimeout(()=>this.textContent='Copy',1500)})" 
      style="background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;font-family:var(--head);font-size:0.75rem;padding:4px 12px;white-space:nowrap;">
      Copy
    </button>
  `;
  playerOverlay.style.position = 'fixed';
  playerBar.style.position = 'relative';
  playerBar.appendChild(bar);
}

function playHLS(proxyUrl, s) {
  if (Hls.isSupported()) {
    hlsInstance = new Hls({ startLevel: -1, capLevelToPlayerSize: false, backBufferLength: 90, maxBufferLength: 60 });
    hlsInstance.loadSource(proxyUrl);
    hlsInstance.attachMedia(videoEl);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
      playerSpinner.classList.remove('active');
      playerInfo.textContent = 'HLS';
      buildQualityMenu(data.levels, hlsInstance.currentLevel);
      videoEl.play().catch(() => {});
    });
    hlsInstance.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
      updateQualityMenu(data.level);
      const lvl = hlsInstance.levels[data.level];
      if (lvl && lvl.height) { playerInfo.textContent = lvl.height + 'p'; qualityBtn.textContent = lvl.height + 'p'; }
    });
    hlsInstance.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        playerSpinner.classList.remove('active');
        playerError.textContent = 'Stream error: ' + (data.details || data.type);
        playerError.style.display = 'block';
      }
    });
  } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    videoEl.src = proxyUrl;
    videoEl.play().catch(() => {});
    playerSpinner.classList.remove('active');
  }
}

// ── Quality menu ───────────────────────────────────────────────────────────────
function buildQualityMenu(levels, currentLevel) {
  qualityMenu.innerHTML = '';

  // "Auto" option
  const autoOpt = document.createElement('div');
  autoOpt.className = 'quality-opt' + (currentLevel === -1 ? ' active' : '');
  autoOpt.innerHTML = `<span class="check">${currentLevel === -1 ? '✓' : ' '}</span> Auto`;
  autoOpt.addEventListener('click', () => {
    hlsInstance.currentLevel = -1;
    qualityMenu.classList.remove('open');
  });
  qualityMenu.appendChild(autoOpt);

  // Per-level options, sorted highest first
  const sorted = levels
    .map((l, i) => ({ i, h: l.height || 0, w: l.width || 0, bw: l.bitrate || 0 }))
    .sort((a, b) => b.h - a.h || b.bw - a.bw);

  sorted.forEach(({ i, h, bw }) => {
    const label = h ? `${h}p` : (bw ? `${Math.round(bw / 1000)}k` : `Level ${i}`);
    const opt = document.createElement('div');
    opt.className = 'quality-opt' + (i === currentLevel ? ' active' : '');
    opt.innerHTML = `<span class="check">${i === currentLevel ? '✓' : ' '}</span> ${label}`;
    opt.addEventListener('click', () => {
      hlsInstance.currentLevel = i;
      qualityMenu.classList.remove('open');
    });
    qualityMenu.appendChild(opt);
  });

  qualityBtn.textContent = currentLevel === -1 ? 'Auto' : (levels[currentLevel]?.height ? `${levels[currentLevel].height}p` : 'Quality');
}

function updateQualityMenu(newLevel) {
  qualityMenu.querySelectorAll('.quality-opt').forEach((opt, i) => {
    const isAuto = i === 0;
    const matches = isAuto ? newLevel === -1 : (i - 1 === newLevel);
    opt.classList.toggle('active', matches);
    opt.querySelector('.check').textContent = matches ? '✓' : ' ';
  });
}

qualityBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  qualityMenu.classList.toggle('open');
});

// ── Player bar auto-hide ───────────────────────────────────────────────────────
function showBar() {
  playerBar.classList.remove('hidden');
  barVisible = true;
  clearTimeout(barTimeout);
  barTimeout = setTimeout(hideBar, 4000);
}

function hideBar() {
  playerBar.classList.add('hidden');
  barVisible = false;
}

playerOverlay.addEventListener('mousemove', showBar);
playerOverlay.addEventListener('touchstart', showBar);
playerOverlay.addEventListener('click', (e) => {
  if (e.target === videoEl) {
    if (barVisible) {
      qualityMenu.classList.remove('open');
    } else {
      showBar();
    }
  }
});

// ── Close player ───────────────────────────────────────────────────────────────
closeBtn.addEventListener('click', closePlayer);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (qualityMenu.classList.contains('open')) {
      qualityMenu.classList.remove('open');
    } else if (playerOverlay.classList.contains('active')) {
      closePlayer();
    }
  }
  if (playerOverlay.classList.contains('active')) {
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') showBar();
  }
});

function closePlayer() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  videoEl.pause();
  videoEl.removeAttribute('src');
  playerOverlay.classList.remove('active');
  playerError.style.display = 'none';
  qualityMenu.classList.remove('open');
  clearTimeout(barTimeout);
}

// ── Utility ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
